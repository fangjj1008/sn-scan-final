<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SN码扫描工具（最终版）</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
               background: #f8f9fa; padding: 15px; }
        .scan-container { max-width: 100%; background: #fff; border-radius: 16px; 
                          box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; }
        h1 { font-size: 22px; color: #333; text-align: center; margin-bottom: 20px; }
        .btn-group { text-align: center; margin-bottom: 20px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; 
               color: #fff; cursor: pointer; margin: 0 5px; transition: all 0.2s; }
        .start-btn { background: #2563eb; }
        .start-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .stop-btn { background: #dc2626; display: none; }
        #scan-region { width: 100%; height: 350px; border-radius: 12px; 
                       overflow: hidden; margin: 0 auto 20px; border: 2px solid #2563eb; }
        .result-box { background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 10px; 
                      padding: 15px; display: none; }
        .result-title { color: #065f46; font-size: 18px; margin-bottom: 10px; }
        .result-text { color: #1f2937; font-size: 17px; font-weight: 600; word-break: break-all; }
        .tips { color: #64748b; font-size: 14px; line-height: 1.6; margin-top: 15px; text-align: center; }
        .error-tips { color: #dc2626; font-size: 14px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="scan-container">
        <h1>📱 SN码条形码扫描</h1>
        
        <div class="btn-group">
            <button id="startBtn" class="btn start-btn" onclick="startScanner()">开始扫描</button>
            <button id="stopBtn" class="btn stop-btn" onclick="stopScanner()">停止扫描</button>
        </div>
        
        <div id="scan-region"></div>
        
        <div id="resultBox" class="result-box">
            <div class="result-title">✅ 扫描成功！</div>
            <div id="scanResult" class="result-text"></div>
        </div>
        
        <div id="errorTips" class="error-tips"></div>
        
        <div class="tips">
            🔍 提示：<br>
            1. 请将条形码对准扫描框，保持光线充足<br>
            2. 扫描成功后会自动停止并显示结果<br>
            3. 如提示摄像头权限，请选择「允许」
        </div>
    </div>

    <script>
        let html5QrcodeInstance = null;
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultBox = document.getElementById('resultBox');
        const scanResult = document.getElementById('scanResult');
        const errorTips = document.getElementById('errorTips');

        const scannerConfig = {
            fps: 15,
            qrbox: { width: 280, height: 120 },
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CODE_128]
        };

        function startScanner() {
            resultBox.style.display = 'none';
            errorTips.style.display = 'none';
            startBtn.disabled = true;
            stopBtn.style.display = 'inline-block';

            html5QrcodeInstance = new Html5Qrcode("scan-region");

            html5QrcodeInstance.start(
                { facingMode: "environment" },
                scannerConfig,
                (decodedText) => {
                    scanResult.textContent = decodedText;
                    resultBox.style.display = 'block';
                    try { navigator.clipboard.writeText(decodedText); } catch (e) {}
                    stopScanner();
                },
                (errorMessage) => { console.log("识别中...", errorMessage); }
            ).catch((err) => {
                errorTips.style.display = 'block';
                errorTips.textContent = `摄像头启动失败：${err.message}。请检查权限或更换浏览器重试。`;
                resetScanner();
            });
        }

        function stopScanner() {
            if (html5QrcodeInstance) {
                html5QrcodeInstance.stop().then(() => resetScanner()).catch(() => resetScanner());
            }
        }

        function resetScanner() {
            html5QrcodeInstance = null;
            startBtn.disabled = false;
            stopBtn.style.display = 'none';
        }

        window.addEventListener('beforeunload', () => {
            if (html5QrcodeInstance) html5QrcodeInstance.stop();
        });
    </script>
</body>
</html>
